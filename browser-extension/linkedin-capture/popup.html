<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 330px;
        margin: 0;
        background: #05080d;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }
      main {
        padding: 16px;
      }
      strong {
        display: block;
        font-size: 15px;
      }
      p {
        margin: 8px 0 0;
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.45;
      }
      button {
        width: 100%;
        min-height: 42px;
        margin-top: 12px;
        border: 1px solid #67e8f9;
        background: transparent;
        color: #67e8f9;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        border-color: rgba(255, 255, 255, 0.16);
        color: #cbd5e1;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #status {
        min-height: 18px;
        color: #a5f3fc;
      }
      #preview {
        display: none;
        margin-top: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        padding: 10px;
      }
      #previewName {
        color: #f8fafc;
        font-size: 13px;
        font-weight: 700;
      }
      #previewHeadline {
        margin-top: 4px;
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>StoreLab OS</strong>
      <p>Capture this LinkedIn profile for StoreLab to read, match and queue for approval.</p>
      <button id="capture">Capture profile</button>
      <button id="open-storelab" class="secondary" type="button">Open StoreLab</button>
      <section id="preview" aria-live="polite">
        <div id="previewName"></div>
        <div id="previewHeadline"></div>
      </section>
      <p id="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
