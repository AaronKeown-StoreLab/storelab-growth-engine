<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        background: #05080d;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }
      main {
        padding: 14px;
      }
      button {
        width: 100%;
        min-height: 40px;
        border: 1px solid #67e8f9;
        background: transparent;
        color: #67e8f9;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      p {
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.45;
      }
      #status {
        color: #a5f3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>StoreLab OS</strong>
      <p>Capture the visible LinkedIn profile into StoreLab for AI review and approval.</p>
      <button id="capture">Capture profile</button>
      <p id="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
